body:
  text: 文星閣重整放生會引彭紹升文星閣放生會肇自我先曾祖南畇府君迄今數十年矣乾隆三十九年始闢放生池於南園木杏橋畜生魚為獨盛而閣中別籓隙地養羊豕雞鶩之屬滿則送之雲棲頃四五年間歲靡食料錢至六七十緡而與會者落落不過數人罄所入猶不能足則魚鳥之得蒙其利者少矣今擬重整前會糾司月十二人人持簿一本歲募人出錢三百六十十之得三千六百為一股積十二股得錢四十千有奇隨時買放生物有餘則以充食料闕則募人為代如是漸增倍屣無算其有田之家量捐食料便可抵錢歲以二月三日通名於桂香殿冬盡則倩僧誦經回向西方淨土俾施者受者作長壽因種菩提果但能盡壽為期勤行匪懈其為福德不可思議第恐諸仁者偶發善心旋復退墮察其根原不無蔽障約舉大概釐為八條勿謂迂談幸垂聽覽或謂性有五常道兼萬善惟茲濡沫之恩豈合含宏之量不知五常之德惟仁最先萬善之門惟愛斯溥舍一牛信可保民放一麑果堪託國愛我生而及彼生斯為潔矩止我殺以救人殺是謂推恩覆簣終必成山涓流何難到海或謂自親及民自民及物等差既別緩急宜分不知禍莫慘於危亡施莫先於觳觫即今耕鑿之民久離於湯火自昔刀兵之劫孰慘於庖厨向涸轍而驚心忍吝一杯之水過屠門而大嚼誰聞半夜之聲或謂天生飛走本以養人物實蠢頑放之何益不知天惟普覆人畜齊觀物盡貪生自它一體如謂以肉養人不宜更生蔬穀將欲貴人賤畜奈何自比豺狼苟仁術之未充亦兩閒之棄物不知責己莫妄窺天或謂易尚大烹禮崇特殺既釣弋之弗廢寧魚鳥之堪憐不知樂奏九成虞廷有率舞之瑞網開三面商書垂咸若之文惟量擴於靡遺斯澤流於無外所以賜生必畜依然疏水之風拱雉有心邈矣山梁之作倘殺機之未盡何大德之能充或謂一方之內一日之間所殺甚多所放甚少以此準彼曷能相救不知大旱之年一渠之水亦可活數畝之田大寒之日一領之裘亦可蘇一人之命始以生而護殺繼轉殺以全生但使願力堅牢決定諸魔退散或謂居常食肉此日放生一暴十寒於事何補不知右手抶人左手扶人扶者之恩稍可抵夫抶者之毒千日謗佛一日念佛謗者之罪猶或消於念者之誠但生機之勃發即天理之昭彰惟當舍舊以圖新豈可順流而不反或謂檻籠甫脫而弋伺於林網𮊁乍離而餌垂於岸直進退之無門雖慈悲其曷濟不知臨決之囚但願緩須臾之死再生之賜亦已游覆載之寬殺者自殺固定業之難逃生者自生庶此心之克盡或謂惻隱所萌祗由乍見生滅既盡乃契真如何容著相而求豈識無為之道不知乍見之心本來常住惟常住故不緣對境而昏真如之法不舍有為惟有為故不墮偏空之執苟定作無為之解亦何殊著相之愚斯邪遁之所歸必破除而毋惑文星閣建放生會疏薛起鳳伏以天地定位大德曰生聖人成能神武不殺三才參立人惟沖氣之和四德兼行元乃資生之本推氣初於形始百族一原驗敦化於川流並育不害浮沉升降絪縕化醇凡諸含識莫不懷生屬在有情皆知愛命式觀泰古世質民淳人與物而相忘物與人而共治毨毛孳尾但紀春秋雨走風飛無傷獝狘鳥巢可俯游魚不驚是以麟鳳在郊龜龍馴沼民無夭札物不虔劉道光五紀之前春在三皇之世所謂各正性命保合太和不識不知順帝之則孔子所由嘆息大同老氏所以能知古始者也自人心日鑿太朴漸雕欲念滋騰雜氣周作茹毛飲血而並有爭心肉食蠶衣遂緣為故習網綸矰矢彌岡被淵鮮臘割烹充庖登爼日用不察同符自然雖以上帝好生不能拯物於刀七之下羣生乞命無以籲天於鼎鑊之中因此殺機遂成劫運水火兵戈之難作旱潦疾疫之患興理非外來端由自致矣聖人順人情而為之節不得已而去其奢六府土穀惟修九門罝罘毋出聞聲見殺仁遠乎庖厨元酒太羮味遺於大饗曲施禮教隱寓慈悲洎乎教演西迦化行東土流水救涸寶勝稱名普通唱斷肉之文大歷刊放生之石嫗煦萬類濟拔三塗他如鑿沼養魚投弓謝鹿放龜救蟻縱鯉活禽載在簡編俱彰福應況乃尚稽往蹟窮測化工鴈亦名王鹿能生女白帝之子為蛇王母之伻為青衣童子留方藥於人間元繡丈夫動風雷於江上斯則化機潛運幽感難窺知微知顯其神其聖類非思議所得而詳情識可得而及者已欽惟元皇帝君殿下長善體元為民永命盡人性以盡物性道在至誠善救物而善救人功符大造弟子等誓心懺罪發願酬恩幸荷生成叨聞訓誡欲達性天之路先憑功德之門竊見蘇州人物殷昌風俗奢泰水居陸産塞谷盈川漁戶屠門連街列市傷殘物命數溢河沙恣養色身空填天塹懼干業報淪歷無窮既不能使大地為嘉林滄海為靈囿不得不資依善地迎導生機近推一念之仁曲全衆生之命文星閣舊有放生會今願共捨淨財續修善事各憑願力隨所見聞充惻隱之端由不忍達之於所忍順清寧之性念吾生不異於他生庶幾善氣熏蒸吉祥來止三災不作八難潛消陰陽和而風雨時物阜成而民康壽用敢潔齊對越激切敷詞伏望元皇帝君施慈忍力開甘露門憫彼羣迷牖其淨信務使人人發同體之悲更冀世世結放生之社自胞暨與均遊浩蕩之天以愛全仁共享安恬之樂固十地之福種實萬善之資糧欲令充周尚希相協不勝戰栗悚惶之至謹奉疏以聞放生會回向文彭紹升弟子紹升願度有情同生淨土故於本縣文星閣舉放生會為現前諸衆生等皈命三尊稱揚佛號願諸衆生仗佛慈悲等蒙攝受從於今日盡未來際斷諸恐怖竭諸煩惱更不相吞相噬相爭相殺進修佛法脫離苦海更為與會弟子等懺除無始以來殺生食肉種種罪緣願令所殺衆生所食衆生仗佛慈悲等蒙攝受化怨毒心歡喜相向得生善道共沐洪波惟願弟子等既生安養還入娑婆普化衆生永斷殺因住無盡壽善根回向不退菩提恭望如來證知我願真實不虗三有四恩同圓種智南園放生池彭紹升蘇州古澤國也環州之水其大者為江為湖小者為瀆為港為溪至不可悉數凡水居諸衆生若巨若細以蕃以育宜無所不容然而取之者日繁操之者日蹙環而顧焉幾一鱗一介之安其居而樂其生也難矣哀哉於是吾黨諸賢發慈悲心依菩薩行既月舉放生會遂因園為池與之安宅延僧守之取流水長者救魚故事顏其所曰流水禪居俾諸衆生永斷殺因克遂生性不離方隅如縱大壑沐日浴月騰波躍雲樂我太平長爾孫子洋洋乎聖人之道皡皡乎王者之風觀於此者不知手之舞之足之蹈之也知歸學人與是勝緣合掌贊嘆為之銘曰天生萬族既奠厥居鳥有山林魚有江湖各靖封疆罔相凌轢保合太和與天無極人為物靈胡不自思弱肉強食安知是非靜觀本來何人何物在宥天下清寧合一習心所錮殺業熾然弋靡餘林網無遺川嗟爾人斯孰不惡死棘芒刺身呼痛曷已縱爾口腹烹肥擊鮮刀砧所過黑眚彌天勿謂是魚其形甚細苟含生性天地同氣爾食是魚傷天地根曾不自覺爾心則昏爾有室家魚有妻子相詬相濡至於沒齒易刀而殺遲速惟均爾不愛魚胡不愛身嗟爾人斯夢夢三世智眼觀之通一無二流離太子昔為人漁魚化為王殺人如魚是業所成如轆轤轉易危履霜由不早辨佛言孔言異口同音大德曰生孔心佛心救物之生戒爾之殺以生止殺是對治法無我無物當生不生我生物生同歸覺城彭氏放生池彭紹升乾隆十七年先大人督學浙江過里居命兒子紹謙等規舍後隙地為園因其窪為池池廣可半畝植以荷稍畜鯽鯉諸魚其後數年紹升讀書園中又時買市上魚縱之玩其泳游以為樂積二十餘年池中魚日充仞而吾家服屬子姓其生長於二十餘年間者且不下三十許人承天地之施沐太平之化我生物生非彼非此日引月長並育無害紹升於是請於先大人立池上顏曰收生池爰為之銘以示我後人銘曰池魚索索彭氏落落池魚蒸蒸彭氏繩繩
